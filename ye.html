<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday to 椰椰丸子</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        body { background: #0077BE; font-family: 'Noto Serif SC', serif; overflow: hidden; }
        .stitch-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .gradient-text {
            background: linear-gradient(45deg, #0077BE, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div class="stitch-card p-12 text-center max-w-lg w-full mx-4 transition-all hover:scale-105 duration-500 cursor-pointer" id="card">
        <div class="text-6xl mb-6">🌺</div>
        <h1 class="text-4xl font-bold mb-4 gradient-text">Dear 椰椰丸子</h1>
        <p class="text-gray-600 text-lg leading-relaxed mb-8">
            从港硕到山东，跨越山海的缘分。<br>
            祝你25岁生日快乐，<br>
            愿未来的职场之路，如史迪奇般勇敢又充满惊喜。
        </p>
        <button id="surpriseBtn" class="bg-[#0077BE] text-white px-8 py-3 rounded-full font-bold hover:bg-[#005a8d] transition">
            点击领取一份礼物
        </button>
    </div>

    <script>
        // 简单的交互动效
        const btn = document.getElementById('surpriseBtn');
        btn.addEventListener('click', () => {
            gsap.to("#card", { rotationY: 360, duration: 1 });
            alert("史迪奇已经收到你的愿望啦！祝你回家乡工作顺利，万事胜意！");
        });

        // 背景漂浮元素动画
        function createBubble() {
            const b = document.createElement('div');
            b.innerHTML = "🌺";
            b.style.position = "absolute";
            b.style.left = Math.random() * 100 + "vw";
            b.style.top = "100vh";
            b.style.fontSize = Math.random() * 20 + 20 + "px";
            document.body.appendChild(b);
            gsap.to(b, { y: -1000, duration: Math.random() * 5 + 5, onComplete: () => b.remove() });
        }
        setInterval(createBubble, 1000);
    </script>
</body>
</html>
