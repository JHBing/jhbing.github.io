<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>椰椰丸子 25岁生日快乐！</title>
    <!-- 引入炫酷的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- 引入彩带特效库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --stitch-blue: #0052A5;
            --stitch-light: #5AA1E3;
            --hawaii-pink: #FF6B81;
            --hawaii-orange: #FFA502;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态背景 */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: linear-gradient(45deg, var(--stitch-blue), #1e3c72, var(--hawaii-pink), var(--hawaii-orange));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 漂浮元素 */
        .floating-element {
            position: absolute;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 75vh;
            perspective: 1000px;
            z-index: 10;
        }

        /* 卡片通用样式（高级毛玻璃） */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            pointer-events: none;
        }

        .card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .card.out {
            opacity: 0;
            transform: translateY(-50px) scale(0.9);
            pointer-events: none;
        }

        /* 文本与排版 */
h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ffffff; /* 直接使用纯白字体，边缘最干净 */
            /* 使用暖粉色阴影和白色发光，去掉原来的黑色阴影 */
            text-shadow: 0 2px 6px rgba(255, 107, 129, 0.6), 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }

        .highlight {
            color: #FFD700;
            font-size: 22px;
        }

        /* 迪士尼/史迪奇元素 */
        .stitch-ears {
            font-size: 60px;
            margin: 10px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 交互按钮 */
        .btn {
            background: linear-gradient(45deg, var(--stitch-light), var(--stitch-blue));
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 82, 165, 0.5);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'ZCOOL KuaiLe', sans-serif;
            width: 80%;
            margin-top: auto;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .img-placeholder {
            font-size: 80px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            margin: 20px 0;
        }

        /* 音乐播放器图标 */
        #music-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            font-size: 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            animation: spin 4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .paused { animation-play-state: paused !important; }

    </style>
</head>
<body>

    <!-- 动态背景层 -->
    <div class="bg-animation" id="bg-animation"></div>

    <!-- 音乐控制 (你可以替换src为史迪奇主题曲《Hawaiian Roller Coaster Ride》的链接) -->
    <div id="music-btn" class="paused">🎵</div>
    <audio id="bg-music" loop>
        <!-- 占位音频，由于浏览器限制，最好让用户点击后再播放 -->
        <source src="dave_bgm.mp3" type="audio/mp3">
    </audio>

    <!-- 卡片交互区 -->
    <div class="container">
        <!-- 第一页：封面 -->
        <div class="card active" id="card-0">
            <div class="img-placeholder">🥥🍡</div>
            <h1>To: 椰椰、萝卜和  丸子</h1>
            <p>快来看看你们的<br>生日祝福信！</p>
            <div class="stitch-ears">✨🌺✨</div>
            <button class="btn" onclick="nextCard(0)">点击开启惊喜 👆</button>
        </div>

        <!-- 第二页：回忆与毕业 -->
        <div class="card" id="card-1">
            <div class="img-placeholder">🎓🛳️</div>
            <h1>25岁生日快乐！</h1>
            <p>恭喜我们顺利港硕毕业！<br>从维多利亚港的晚风，<br>到疯狂赶Due的夜，<br>都是闪闪发光的回忆。</p>
            <p class="highlight">不愧是山东考生，到哪里都是头部！</p>
            <button class="btn" onclick="nextCard(1)">继续翻页 👉</button>
        </div>

        <!-- 第三页：史迪奇祝福与潍坊 -->
        <div class="card" id="card-2">
            <div class="img-placeholder">🪁🌊</div>
            <h1>下一站：鸢都</h1>
            <p>马上就要回到潍坊开启职业新阶段！<br>史迪奇说：<br><span class="highlight">"Ohana means family."</span><br>无论飞得多高多远，<br>家人和朋友都是你的后盾！</p>
            <button class="btn" onclick="nextCard(2)">最后一份礼物 🎁</button>
        </div>

        <!-- 第四页：最终祝福 -->
        <div class="card" id="card-3">
            <div class="img-placeholder">🎂👾</div>
            <h1>Hello, 25岁！</h1>
            <p>祝宁的生活：<br>像史迪奇一样充满活力！<br>像夏威夷的阳光一样灿烂！<br>新工作一切顺利，<br>不满意咱就给他干倒闭！<br>（㊗️青大同学也一路繁花！）</p>
            <button class="btn" style="background: linear-gradient(45deg, #FF6B81, #FFA502);" onclick="celebrate()">🎉 点击放礼花 🎉</button>
        </div>
    </div>

    <script>
        // 生成背景漂浮的热带元素/星星
        const bgContainer = document.getElementById('bg-animation');
        const floatingItems = ['✨', '🌺', '🌊', '🥥', '🪁', '🎓'];
        
        for(let i=0; i<20; i++) {
            let el = document.createElement('div');
            el.className = 'floating-element';
            el.innerText = floatingItems[Math.floor(Math.random() * floatingItems.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 15) + 'px';
            el.style.animationDuration = (Math.random() * 5 + 5) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            bgContainer.appendChild(el);
        }

        // 翻页逻辑
        function nextCard(currentIndex) {
            // 尝试播放音乐（应对浏览器的自动播放限制）
            const music = document.getElementById('bg-music');
            const musicBtn = document.getElementById('music-btn');
            if (music.paused) {
                music.play().catch(e => console.log("等待用户交互后播放"));
                musicBtn.classList.remove('paused');
            }

            const currentCard = document.getElementById('card-' + currentIndex);
            const nextCard = document.getElementById('card-' + (currentIndex + 1));
            
            if(currentCard && nextCard) {
                currentCard.classList.remove('active');
                currentCard.classList.add('out');
                
                setTimeout(() => {
                    nextCard.classList.add('active');
                }, 300); // 稍微延迟，制造交替动画感
            }
        }

        // 音乐按钮控制
        document.getElementById('music-btn').addEventListener('click', function() {
            const music = document.getElementById('bg-music');
            if (music.paused) {
                music.play();
                this.classList.remove('paused');
            } else {
                music.pause();
                this.classList.add('paused');
            }
        });

        // 满屏彩带庆祝特效
        function celebrate() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                // 使用史迪奇色系和落日色系的彩带
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    colors: ['#0052A5', '#5AA1E3', '#FF6B81', '#FFA502', '#FFD700'],
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount,
                    colors: ['#0052A5', '#5AA1E3', '#FF6B81', '#FFA502', '#FFD700'],
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 250);
            
            // 按钮文字变化
            event.target.innerText = "前程似锦，妙妙妙妙！";
            event.target.style.transform = "scale(1.05)";
        }
    </script>
</body>
</html>
